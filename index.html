<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- PWA Settings and Brand Icons -->
    <title>CoreanoLingo 🇰🇷 - Impara l'Hangul</title>
    <meta name="description" content="Esercitati con l'alfabeto coreano Hangul, scarica fogli stampabili PDF e gioca offline." />
    
    <!-- Theme & Android configurations -->
    <meta name="theme-color" content="#0a51c2" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />

    <!-- iOS / Apple Device Web App configurations -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CoreanoLingo" />
    <link rel="apple-touch-icon" href="/icon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Register PWA Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('CoreanoLingo PWA Service Worker registrato con successo:', registration.scope);
            })
            .catch((error) => {
              console.error('Errore durante la registrazione del Service Worker:', error);
            });
        });
      }
    </script>
  </body>
</html>
